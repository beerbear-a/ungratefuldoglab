<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ungrateful Dog Lab. — Shinichi Arita (@Beerbear_A)">
  <title>Ungrateful Dog Lab.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --accent: #a7e8f6;
      --text: #42403d;
      --muted: rgba(66,64,61,0.36);
      --border: rgba(66,64,61,0.1);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    #hero {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      overflow: hidden;
    }

    #noise-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero-title {
      position: relative;
      z-index: 1;
      font-size: clamp(1.25rem, 4vw, 2.75rem);
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      white-space: nowrap;
      line-height: 1;
      color: var(--text);
      opacity: 0;
      animation: up 1.2s cubic-bezier(0.22,1,0.36,1) forwards 0.2s;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.75rem 2.5rem;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 2rem;
    }

    .footer-identity {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .footer-name {
      font-size: 1.125rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .footer-meta {
      font-family: 'Inter', sans-serif;
      font-size: 0.625rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .footer-link {
      font-size: 0.875rem;
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      position: relative;
    }
    .footer-link::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }
    .footer-link:hover { color: var(--text); }
    .footer-link:hover::after { transform: scaleX(1); }

    .footer-copy {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.5625rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes up { to { opacity: 1; transform: none; } }

    @media (max-width: 520px) {
      .hero-title { letter-spacing: 0.12em; white-space: normal; text-align: center; line-height: 1.15; }
      footer { grid-template-columns: 1fr; align-items: start; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <section id="hero">
    <canvas id="noise-canvas" aria-hidden="true"></canvas>
    <h1 class="hero-title">Ungrateful Dog Lab.</h1>
  </section>

  <footer>
    <div class="footer-identity">
      <span class="footer-name">Shinichi Arita</span>
      <span class="footer-meta">ex:Beerbear &nbsp;/&nbsp; DJ &nbsp;/&nbsp; Dev</span>
    </div>
    <nav class="footer-links">
      <a href="https://x.com/Beerbear_A" class="footer-link" target="_blank" rel="noopener noreferrer">X</a>
      <a href="https://note.com/beerbear_a" class="footer-link" target="_blank" rel="noopener noreferrer">Note</a>
    </nav>
    <p class="footer-copy">&copy; 2025 Ungrateful Dog Lab.</p>
  </footer>

  <script>
    const canvas = document.getElementById('noise-canvas');
    const ctx    = canvas.getContext('2d');

    const ACCENT = [167, 232, 246];
    const DARK   = [66,  64,  61];

    function resize() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Particles ──────────────────────────────
    // Each particle spawns randomly but avoids a
    // circular dead-zone around the canvas center.

    const MAX     = 55;
    const SAFE_R  = 0.22; // fraction of min(w,h) kept clear around center

    let particles = [];

    function safeSpawn() {
      const cx = canvas.width  / 2;
      const cy = canvas.height / 2;
      const r  = Math.min(canvas.width, canvas.height) * SAFE_R;

      let x, y, attempts = 0;
      do {
        x = Math.random() * canvas.width;
        y = Math.random() * canvas.height;
        attempts++;
      } while (Math.hypot(x - cx, y - cy) < r && attempts < 30);

      const size       = Math.random() < 0.6 ? 2 : Math.random() < 0.5 ? 3 : 1;
      const useAccent  = Math.random() < 0.62;
      const maxOpacity = Math.random() * 0.55 + 0.12;
      const ttl        = Math.random() * 90 + 30; // frames alive

      return { x: Math.floor(x), y: Math.floor(y), size, useAccent, maxOpacity, age: 0, ttl };
    }

    function tickParticles() {
      // age existing
      particles = particles.filter(p => p.age < p.ttl);
      particles.forEach(p => p.age++);

      // spawn new ones randomly
      if (particles.length < MAX && Math.random() < 0.35) {
        particles.push(safeSpawn());
      }
    }

    function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles.forEach(p => {
        const progress = p.age / p.ttl;
        // fade in first 20%, hold, fade out last 20%
        let a;
        if      (progress < 0.2) a = easeInOut(progress / 0.2);
        else if (progress > 0.8) a = easeInOut((1 - progress) / 0.2);
        else                      a = 1;

        const [r, g, b] = p.useAccent ? ACCENT : DARK;
        ctx.fillStyle = `rgba(${r},${g},${b},${p.maxOpacity * a})`;
        ctx.fillRect(p.x, p.y, p.size, p.size);
      });

      // ── occasional glitch lines ──
      // thin horizontal slices that appear rarely in the periphery
      if (Math.random() < 0.015) {
        const zone = Math.random() < 0.5 ? 'top' : 'bottom';
        const yRange = zone === 'top'
          ? Math.random() * canvas.height * 0.3
          : canvas.height * 0.7 + Math.random() * canvas.height * 0.3;

        const lineW  = Math.random() * canvas.width * 0.3 + 20;
        const lineX  = Math.random() * (canvas.width - lineW);
        const [r, g, b] = Math.random() < 0.7 ? ACCENT : DARK;

        ctx.fillStyle = `rgba(${r},${g},${b},${Math.random() * 0.35 + 0.1})`;
        ctx.fillRect(lineX, Math.floor(yRange), lineW, 1);
      }
    }

    let last = 0;
    const FPS_INTERVAL = 55;

    function loop(t) {
      if (t - last >= FPS_INTERVAL) {
        tickParticles();
        draw();
        last = t;
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>

</body>
</html>
