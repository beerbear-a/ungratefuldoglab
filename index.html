<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CSS Controlled SVG</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f0f0;
      margin: 0;
    }

    /* ── ここからSVGのCSS制御 ── */

    .dog_svg {
      width: 80%;
      max-width: 500px;
      /* ここで指定した color が、SVG全体の基本色（currentColor）になります */
      color: #42403d; 
      transition: color 0.3s ease; /* 色がフワッと変わるアニメーション */
      cursor: pointer;
    }

    .dog_svg svg {
      width: 100%;
      height: auto;
      display: block;
      /* 親要素の color を引き継ぐ設定 */
      fill: currentColor; 
    }

    /* 元々白（.st0）だったアクセントパーツの色指定 */
    .dog_svg .accent-part {
      fill: #ffffff; /* 背景色と同じにすると「くり抜かれた」ように見えます */
      transition: fill 0.3s ease;
    }

    /* ── ホバー時のエフェクト例 ── */
    .dog_svg:hover {
      color: #a7e8f6; /* メインカラーが水色に変化 */
    }
    .dog_svg:hover .accent-part {
      fill: #222222; /* アクセント部分も合わせて色を変えることができます */
    }

  </style>
</head>
