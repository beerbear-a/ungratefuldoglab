<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ungrateful Dog Lab. — Shinichi Arita (@Beerbear_A)">
  <title>Ungrateful Dog Lab.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --accent: #a7e8f6;
      --text: #42403d;
      --muted: rgba(66,64,61,0.36);
      --border: rgba(66,64,61,0.1);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    #hero {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      overflow: hidden;
    }

    #noise-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero-title {
      position: relative;
      z-index: 1;
      font-size: clamp(1.25rem, 4vw, 2.75rem);
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      white-space: nowrap;
      line-height: 1;
      color: var(--text);
      opacity: 0;
      animation: up 1.2s cubic-bezier(0.22,1,0.36,1) forwards 0.2s;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.75rem 2.5rem;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 2rem;
    }

    .footer-identity {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .footer-name {
      font-size: 1.125rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .footer-meta {
      font-family: 'Inter', sans-serif;
      font-size: 0.625rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .footer-link {
      font-size: 0.875rem;
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      position: relative;
    }
    .footer-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0; right: 0;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }
    .footer-link:hover { color: var(--text); }
    .footer-link:hover::after { transform: scaleX(1); }

    .footer-copy {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.5625rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes up { to { opacity: 1; transform: none; } }

    @media (max-width: 520px) {
      .hero-title { letter-spacing: 0.12em; white-space: normal; text-align: center; line-height: 1.15; }
      footer { grid-template-columns: 1fr; align-items: start; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <section id="hero">
    <canvas id="noise-canvas" aria-hidden="true"></canvas>
    <h1 class="hero-title">Ungrateful Dog Lab.</h1>
  </section>

  <footer>
    <div class="footer-identity">
      <span class="footer-name">Shinichi Arita</span>
      <span class="footer-meta">ex:Beerbear &nbsp;/&nbsp; DJ &nbsp;/&nbsp; Dev</span>
    </div>
    <nav class="footer-links">
      <a href="https://x.com/Beerbear_A" class="footer-link" target="_blank" rel="noopener noreferrer">X</a>
      <a href="https://note.com/beerbear_a" class="footer-link" target="_blank" rel="noopener noreferrer">Note</a>
    </nav>
    <p class="footer-copy">&copy; 2025 Ungrateful Dog Lab.</p>
  </footer>

  <script>
    const canvas = document.getElementById('noise-canvas');
    const ctx = canvas.getContext('2d');

    const ACCENT_RGB  = [167, 232, 246]; // #a7e8f6
    const DARK_RGB    = [66,  64,  61];  // #42403d

    function resize() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Pre-build a grid of cells that we flicker
    const CELL = 3;           // px per noise cell
    let cells = [];

    function buildCells() {
      cells = [];
      const cols = Math.ceil(canvas.width  / CELL);
      const rows = Math.ceil(canvas.height / CELL);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          cells.push({ x: c * CELL, y: r * CELL, active: false });
        }
      }
    }

    window.addEventListener('resize', () => { resize(); buildCells(); });
    buildCells();

    // How many cells to randomly flip each frame
    const FLIP_RATIO = 0.018;

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const flipCount = Math.floor(cells.length * FLIP_RATIO);
      for (let i = 0; i < flipCount; i++) {
        const idx = Math.floor(Math.random() * cells.length);
        cells[idx].active = !cells[idx].active;
        // randomise color tendency per flip
        cells[idx].useAccent = Math.random() < 0.65;
        cells[idx].alpha = Math.random() * 0.55 + 0.08;
      }

      cells.forEach(cell => {
        if (!cell.active) return;
        const [r, g, b] = cell.useAccent ? ACCENT_RGB : DARK_RGB;
        ctx.fillStyle = `rgba(${r},${g},${b},${cell.alpha})`;
        ctx.fillRect(cell.x, cell.y, CELL, CELL);
      });
    }

    let last = 0;
    const INTERVAL = 60; // ~16fps flicker
    function loop(t) {
      if (t - last >= INTERVAL) {
        draw();
        last = t;
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>

</body>
</html>
