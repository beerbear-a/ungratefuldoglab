<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ungrateful Dog Lab. — Shinichi Arita (@Beerbear_A)">
  <title>Ungrateful Dog Lab.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white:  #ffffff;
      --accent: #a7e8f6;
      --dark:   #42403d;
      --muted:  rgba(66,64,61,0.38);
      --border: rgba(66,64,61,0.12);
    }
    html, body { height: 100%; }
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--white);
      color: var(--dark);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    #hero {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      overflow: hidden;
    }
    #vj-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .hero-title {
      position: relative;
      z-index: 1;
      font-size: clamp(1.1rem, 3.5vw, 2.5rem);
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      white-space: nowrap;
      color: var(--dark);
      text-shadow:
        0 0 20px #fff,
        0 0 40px #fff,
        0 0 80px rgba(255,255,255,0.9);
      opacity: 0;
      animation: up 1.4s cubic-bezier(0.22,1,0.36,1) forwards 0.4s;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      text-align: center;
    }
    .footer-name {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .footer-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.875rem 2rem;
      min-width: 140px;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--dark);
      text-decoration: none;
      border: 1.5px solid var(--dark);
      transition: background 0.22s, border-color 0.22s;
    }
    .footer-link:hover, .footer-link:active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .footer-link svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }
    .footer-copy {
      font-family: 'Inter', sans-serif;
      font-size: 0.5625rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes up { to { opacity: 1; transform: none; } }
    @media (max-width: 480px) {
      .hero-title { letter-spacing: 0.14em; white-space: normal; text-align: center; line-height: 1.3; }
      .footer-link { min-width: 130px; padding: 0.875rem 1.5rem; }
    }
  </style>
</head>
<body>

  <section id="hero">
    <canvas id="vj-canvas" aria-hidden="true"></canvas>
    <h1 class="hero-title">Ungrateful Dog Lab.</h1>
  </section>

  <footer>
    <p class="footer-name">Shinichi Arita</p>
    <nav class="footer-links">
      <a href="https://x.com/Beerbear_A" class="footer-link" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        X (Twitter)
      </a>
      <a href="https://note.com/beerbear_a" class="footer-link" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v16l4-4h12a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 12H7v-2h5v2zm5-4H7V9h10v2z"/></svg>
        Note
      </a>
    </nav>
    <p class="footer-copy">&copy; 2025 Ungrateful Dog Lab.</p>
  </footer>

  <script>
    const canvas = document.getElementById('vj-canvas');
    const ctx    = canvas.getContext('2d');

    let W, H, DPR, CX, CY, DIAG;

    function resize() {
      DPR = window.devicePixelRatio || 1;
      const r = canvas.getBoundingClientRect();
      W = r.width; H = r.height;
      CX = W / 2; CY = H / 2;
      DIAG = Math.hypot(W, H);
      canvas.width  = W * DPR;
      canvas.height = H * DPR;
      ctx.scale(DPR, DPR);
    }
    window.addEventListener('resize', resize);
    resize();

    // ─────────────────────────────────────────────────────────────────
    // Expanding ring pool
    // ─────────────────────────────────────────────────────────────────
    const SHAPES = [0, 0, 0, 3, 4, 4, 6]; // 0 = circle; weighted toward circles
    const rings  = [];
    let nextSpawn = 0;

    function spawnRing(sec) {
      rings.push({
        born:      sec,
        life:      2.8 + Math.random() * 2.2,
        maxR:      DIAG * (0.28 + Math.random() * 0.38),
        sides:     SHAPES[Math.floor(Math.random() * SHAPES.length)],
        rot:       Math.random() * Math.PI * 2,
        rotSpeed:  (Math.random() - 0.5) * 0.4,
        accent:    Math.random() < 0.65,
      });
    }

    function drawRing(ring, sec) {
      const age  = sec - ring.born;
      const p    = age / ring.life;           // 0 → 1
      if (p >= 1) return false;

      const r   = ring.maxR * p;
      // fade: quick ramp in, long fade out
      const a   = Math.pow(Math.sin(p * Math.PI), 0.6) * 0.55;
      const rot = ring.rot + ring.rotSpeed * sec;

      ctx.lineWidth   = 0.5;
      ctx.strokeStyle = ring.accent
        ? `rgba(167,232,246,${a})`
        : `rgba(66,64,61,${a * 0.45})`;

      ctx.beginPath();
      if (ring.sides === 0) {
        ctx.arc(CX, CY, r, 0, Math.PI * 2);
      } else {
        for (let i = 0; i <= ring.sides; i++) {
          const θ = (i / ring.sides) * Math.PI * 2 + rot;
          const x = CX + r * Math.cos(θ);
          const y = CY + r * Math.sin(θ);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
      }
      ctx.stroke();
      return true;
    }

    // ─────────────────────────────────────────────────────────────────
    // Static thin grid (very faint)
    // ─────────────────────────────────────────────────────────────────
    function drawGrid(sec) {
      const CELL = 60;
      // very slow drift
      const ox = (sec * 4) % CELL;
      const oy = (sec * 3) % CELL;

      ctx.strokeStyle = 'rgba(167,232,246,0.1)';
      ctx.lineWidth   = 0.4;

      ctx.beginPath();
      for (let x = -CELL + (W % CELL) / 2 - ox; x < W + CELL; x += CELL) {
        ctx.moveTo(x, 0); ctx.lineTo(x, H);
      }
      for (let y = -CELL + (H % CELL) / 2 - oy; y < H + CELL; y += CELL) {
        ctx.moveTo(0, y); ctx.lineTo(W, y);
      }
      ctx.stroke();
    }

    // ─────────────────────────────────────────────────────────────────
    // Rotating radial spokes from center
    // ─────────────────────────────────────────────────────────────────
    function drawSpokes(sec) {
      const N      = 12;
      const maxR   = Math.min(W, H) * 0.42;
      const rot    = sec * 0.07;
      const breath = 0.55 + 0.45 * Math.sin(sec * 0.35);

      ctx.lineWidth = 0.4;
      for (let i = 0; i < N; i++) {
        const θ = (i / N) * Math.PI * 2 + rot;
        const r = maxR * breath;
        const a = 0.05 + 0.06 * Math.abs(Math.sin((i / N) * Math.PI + sec * 0.2));
        ctx.strokeStyle = `rgba(66,64,61,${a})`;
        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.lineTo(CX + Math.cos(θ) * r, CY + Math.sin(θ) * r);
        ctx.stroke();
      }
    }

    // ─────────────────────────────────────────────────────────────────
    // Lissajous figure — oscilloscope / audio X-Y plot
    // ─────────────────────────────────────────────────────────────────
    const LISSAJOUS = [
      { a: 3, b: 2 },
      { a: 5, b: 4 },
      { a: 4, b: 3 },
    ];
    let lisIdx = 0, lisSwitch = 0;

    function drawLissajous(sec) {
      // Cycle through figures every ~10 s
      if (sec - lisSwitch > 10) { lisIdx = (lisIdx + 1) % LISSAJOUS.length; lisSwitch = sec; }
      const { a, b } = LISSAJOUS[lisIdx];
      const δ = sec * 0.12;            // slowly rotating phase
      const scale = Math.min(W, H) * 0.12;

      ctx.strokeStyle = 'rgba(167,232,246,0.28)';
      ctx.lineWidth   = 0.5;
      ctx.beginPath();
      const N = 600;
      for (let i = 0; i <= N; i++) {
        const t = (i / N) * Math.PI * 2;
        const x = CX + scale * Math.sin(a * t + δ);
        const y = CY + scale * Math.sin(b * t);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // ─────────────────────────────────────────────────────────────────
    // Main loop
    // ─────────────────────────────────────────────────────────────────
    function draw(t) {
      const sec = t / 1000;

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      drawGrid(sec);
      drawSpokes(sec);
      drawLissajous(sec);

      // Spawn rings on a rhythm-like interval
      if (sec >= nextSpawn) {
        spawnRing(sec);
        // Occasionally double-spawn for density variation
        if (Math.random() < 0.3) spawnRing(sec);
        nextSpawn = sec + 0.7 + Math.random() * 0.8;
      }

      // Draw & prune dead rings
      for (let i = rings.length - 1; i >= 0; i--) {
        if (!drawRing(rings[i], sec)) rings.splice(i, 1);
      }
    }

    function loop(t) { draw(t); requestAnimationFrame(loop); }
    requestAnimationFrame(loop);
  </script>

</body>
</html>
