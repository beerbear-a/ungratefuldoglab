<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ungrateful Dog Lab. — Shinichi Arita (@Beerbear_A)">
  <title>Ungrateful Dog Lab.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark: #0c0b0a;
      --bg-light: #ffffff;
      --accent: #a7e8f6;
      --text-dark: #42403d;
      --muted: rgba(66,64,61,0.36);
      --border: rgba(66,64,61,0.1);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--bg-light);
      color: var(--text-dark);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    #hero {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      overflow: hidden;
      background: var(--bg-dark);
    }

    #signal-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero-title {
      position: relative;
      z-index: 1;
      font-size: clamp(1.1rem, 3.5vw, 2.5rem);
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      white-space: nowrap;
      color: #ffffff;
      /* Dark halo so text sits above waveforms */
      text-shadow:
        0 0 60px var(--bg-dark),
        0 0 30px var(--bg-dark),
        0 0 12px var(--bg-dark);
      opacity: 0;
      animation: up 1.4s cubic-bezier(0.22,1,0.36,1) forwards 0.3s;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.75rem 2.5rem;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 2rem;
    }

    .footer-identity { display: flex; flex-direction: column; gap: 0.3rem; }

    .footer-name {
      font-size: 1.125rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text-dark);
    }

    .footer-meta {
      font-family: 'Inter', sans-serif;
      font-size: 0.625rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-links { display: flex; gap: 1.5rem; align-items: center; }

    .footer-link {
      font-size: 0.875rem;
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      position: relative;
    }
    .footer-link::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }
    .footer-link:hover { color: var(--text-dark); }
    .footer-link:hover::after { transform: scaleX(1); }

    .footer-copy {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.5625rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes up { to { opacity: 1; transform: none; } }

    @media (max-width: 520px) {
      .hero-title { letter-spacing: 0.14em; white-space: normal; text-align: center; line-height: 1.3; }
      footer { grid-template-columns: 1fr; align-items: start; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <section id="hero">
    <canvas id="signal-canvas" aria-hidden="true"></canvas>
    <h1 class="hero-title">Ungrateful Dog Lab.</h1>
  </section>

  <footer>
    <div class="footer-identity">
      <span class="footer-name">Shinichi Arita</span>
      <span class="footer-meta">ex:Beerbear &nbsp;/&nbsp; DJ &nbsp;/&nbsp; Dev</span>
    </div>
    <nav class="footer-links">
      <a href="https://x.com/Beerbear_A" class="footer-link" target="_blank" rel="noopener noreferrer">X</a>
      <a href="https://note.com/beerbear_a" class="footer-link" target="_blank" rel="noopener noreferrer">Note</a>
    </nav>
    <p class="footer-copy">&copy; 2025 Ungrateful Dog Lab.</p>
  </footer>

  <script>
    const canvas = document.getElementById('signal-canvas');
    const ctx    = canvas.getContext('2d');

    const BG = '#0c0b0a';

    let W, H;
    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Waveform shape ───────────────────────────────────────────────
    // Superposition of inharmonic partials, rectified and sharpened —
    // mimics the aperiodic, spiky character of pulsar radio data.
    function pulse(phase) {
      const raw =
        Math.sin(phase)         * 0.54 +
        Math.sin(phase * 2.17)  * 0.24 +
        Math.sin(phase * 3.83)  * 0.13 +
        Math.sin(phase * 7.11)  * 0.06 +
        Math.sin(phase * 11.3)  * 0.03;
      // Rectify then sharpen: suppresses baseline noise, sharpens peaks
      return Math.pow(Math.max(0, raw), 2.2);
    }

    // ── Stack parameters ─────────────────────────────────────────────
    const LINES = 40;
    const TOP_FRAC    = 0.06;
    const BOTTOM_FRAC = 0.94;

    function draw(t) {
      const sec = t / 1000;

      // Dark background
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);

      const totalH  = H * (BOTTOM_FRAC - TOP_FRAC);
      const spacing = totalH / (LINES - 1);

      for (let i = 0; i < LINES; i++) {
        const baseY    = H * TOP_FRAC + i * spacing;
        const progress = i / (LINES - 1);          // 0 = top, 1 = bottom

        // Bell-curve amplitude envelope, peak at 65% down the stack
        const env = Math.exp(-Math.pow((progress - 0.65) / 0.28, 2) * 2.8);
        const maxAmp = spacing * 5.5 * env;

        // Unique phase seed per line; very slow drift for life
        const seed = i * 83.17;
        const drift = sec * 0.055;

        // Sample waveform across full width (2 px steps → performance)
        const STEP = 2;
        const pts  = [];
        for (let x = 0; x <= W; x += STEP) {
          const phase = (x / W) * Math.PI * 20 + seed + drift;
          pts.push([x, baseY - pulse(phase) * maxAmp]);
        }
        // Ensure we end exactly at W
        const last = pts[pts.length - 1];
        if (last[0] < W) pts.push([W, baseY]);

        // ── Fill below waveform with bg colour ──────────────────────
        // This is the core of the "stacking" illusion: each line's body
        // occludes lines drawn earlier, so lower lines appear in front.
        ctx.fillStyle = BG;
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (const [x, y] of pts) ctx.lineTo(x, y);
        ctx.lineTo(W, H);
        ctx.lineTo(0, H);
        ctx.closePath();
        ctx.fill();

        // ── Stroke the waveform line ────────────────────────────────
        const alpha = 0.28 + env * 0.68;  // brighter where envelope peaks
        ctx.strokeStyle = `rgba(167,232,246,${alpha})`;
        ctx.lineWidth   = 0.9;
        ctx.lineJoin    = 'round';
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let k = 1; k < pts.length; k++) ctx.lineTo(pts[k][0], pts[k][1]);
        ctx.stroke();
      }
    }

    function loop(t) {
      draw(t);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>

</body>
</html>
