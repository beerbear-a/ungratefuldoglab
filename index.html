<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ungrateful Dog Lab. — Shinichi Arita (@Beerbear_A)">
  <title>Ungrateful Dog Lab.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:  #ffffff;
      --accent: #a7e8f6;
      --dark:   #42403d;
      --muted:  rgba(66,64,61,0.38);
      --border: rgba(66,64,61,0.12);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--white);
      color: var(--dark);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    #hero {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      overflow: hidden;
      background: var(--white);
    }

    #signal-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hero-title {
      position: relative;
      z-index: 1;
      font-size: clamp(1.1rem, 3.5vw, 2.5rem);
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      white-space: nowrap;
      color: var(--dark);
      text-shadow:
        0 0 24px var(--white),
        0 0 48px var(--white),
        0 0 72px var(--white);
      opacity: 0;
      animation: up 1.4s cubic-bezier(0.22,1,0.36,1) forwards 0.3s;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      text-align: center;
    }

    .footer-name {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .footer-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.875rem 2rem;
      min-width: 140px;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--dark);
      text-decoration: none;
      border: 1.5px solid var(--dark);
      transition: background 0.22s ease, border-color 0.22s ease, color 0.22s ease;
    }
    .footer-link:hover,
    .footer-link:active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .footer-link svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .footer-copy {
      font-family: 'Inter', sans-serif;
      font-size: 0.5625rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes up { to { opacity: 1; transform: none; } }

    @media (max-width: 480px) {
      .hero-title { letter-spacing: 0.14em; white-space: normal; text-align: center; line-height: 1.3; }
      .footer-link { min-width: 130px; padding: 0.875rem 1.5rem; }
    }
  </style>
</head>
<body>

  <section id="hero">
    <canvas id="signal-canvas" aria-hidden="true"></canvas>
    <h1 class="hero-title">Ungrateful Dog Lab.</h1>
  </section>

  <footer>
    <p class="footer-name">Shinichi Arita</p>
    <nav class="footer-links">
      <a href="https://x.com/Beerbear_A" class="footer-link" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        X (Twitter)
      </a>
      <a href="https://note.com/beerbear_a" class="footer-link" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v16l4-4h12a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 12H7v-2h5v2zm5-4H7V9h10v2z"/></svg>
        Note
      </a>
    </nav>
    <p class="footer-copy">&copy; 2025 Ungrateful Dog Lab.</p>
  </footer>

  <script>
    const canvas = document.getElementById('signal-canvas');
    const ctx    = canvas.getContext('2d');

    let W, H;
    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
      buildLines();
    }
    window.addEventListener('resize', resize);

    // ── Waveform: inharmonic partials, rectified + sharpened ────────
    function pulse(phase) {
      const raw =
        Math.sin(phase)        * 0.54 +
        Math.sin(phase * 2.17) * 0.24 +
        Math.sin(phase * 3.83) * 0.13 +
        Math.sin(phase * 7.11) * 0.06 +
        Math.sin(phase * 11.3) * 0.03;
      return Math.pow(Math.max(0, raw), 2.2);
    }

    const LINES      = 40;
    const TOP_FRAC   = 0.06;
    const BOT_FRAC   = 0.94;
    let lines = [];

    function buildLines() {
      const totalH  = H * (BOT_FRAC - TOP_FRAC);
      const spacing = totalH / (LINES - 1);

      // Preserve seeds if already built so motion is continuous on resize
      lines = Array.from({ length: LINES }, (_, i) => {
        const progress = i / (LINES - 1);
        const env      = Math.exp(-Math.pow((progress - 0.65) / 0.28, 2) * 2.8);
        const prev     = lines[i];
        return {
          baseY:       H * TOP_FRAC + i * spacing,
          env,
          baseAmp:     spacing * 5.5 * env,
          seed:        prev ? prev.seed : i * 83.17 + Math.random() * 40,
          // All lines flow left — different speeds make them visually independent
          speed:       prev ? prev.speed   : 0.8 + Math.random() * 1.6,
          freqMod:     prev ? prev.freqMod : 0.7 + Math.random() * 0.6,
          // Breath: amplitude pulses at a visible rate
          breathRate:  prev ? prev.breathRate  : 0.5 + Math.random() * 1.4,
          breathPhase: prev ? prev.breathPhase : Math.random() * Math.PI * 2,
          // Spike: random transient that occasionally fires
          spikeAt:     prev ? prev.spikeAt     : Math.random() * 8,
          spikeAmp:    1,
          isAccent:    Math.random() < 0.55 + env * 0.35,
        };
      });
    }

    buildLines();
    resize();

    // ── Draw ─────────────────────────────────────────────────────────
    function draw(t) {
      const sec = t / 1000;

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      for (const ln of lines) {
        // Breathing envelope — amplitude oscillates gently over time
        const breath = 0.65 + 0.35 * Math.sin(sec * ln.breathRate + ln.breathPhase);

        // Random transient spike: fires at spikeAt, decays fast
        const timeSinceSpike = sec - ln.spikeAt;
        const spike = timeSinceSpike >= 0
          ? Math.exp(-timeSinceSpike * 4) * (1.8 * ln.env)
          : 0;
        // Schedule next spike
        if (timeSinceSpike > 0.8 + Math.random() * 6) {
          ln.spikeAt  = sec + 1.5 + Math.random() * 7;
          ln.spikeAmp = 1.2 + Math.random() * 1.6;
        }

        const amp = ln.baseAmp * breath + ln.baseAmp * spike * ln.spikeAmp;

        // Sample waveform
        const STEP = 2;
        const pts  = [];
        for (let x = 0; x <= W; x += STEP) {
          const phase = (x / W) * Math.PI * 10 * ln.freqMod + ln.seed + sec * ln.speed;
          pts.push([x, ln.baseY - pulse(phase) * amp]);
        }
        if (pts[pts.length - 1][0] < W) pts.push([W, ln.baseY]);

        // White fill → occlusion / stacking illusion
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (const [x, y] of pts) ctx.lineTo(x, y);
        ctx.lineTo(W, H);
        ctx.lineTo(0, H);
        ctx.closePath();
        ctx.fill();

        // Stroke
        const alpha = (0.22 + ln.env * 0.72) * (0.7 + breath * 0.3);
        ctx.strokeStyle = ln.isAccent
          ? `rgba(167,232,246,${alpha})`
          : `rgba(66,64,61,${alpha * 0.5})`;
        ctx.lineWidth = 0.85;
        ctx.lineJoin  = 'round';
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let k = 1; k < pts.length; k++) ctx.lineTo(pts[k][0], pts[k][1]);
        ctx.stroke();
      }
    }

    function loop(t) { draw(t); requestAnimationFrame(loop); }
    requestAnimationFrame(loop);
  </script>

</body>
</html>
