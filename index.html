<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ungrateful Dog Lab. — Shinichi Arita (@Beerbear_A)">
  <title>Ungrateful Dog Lab.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --accent: #a7e8f6;
      --text: #42403d;
      --muted: rgba(66,64,61,0.36);
      --border: rgba(66,64,61,0.1);
    }

    html, body {
      height: 100%;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    #hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 1.75rem;
      min-height: 100svh;
      position: relative;
    }

    .hero-title {
      font-size: clamp(1.75rem, 7.5vw, 7rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
      line-height: 1;
      color: var(--text);
      opacity: 0;
      animation: up 1.1s cubic-bezier(0.22,1,0.36,1) forwards 0.05s;
    }

    .hero-accent {
      width: 1px;
      height: 56px;
      background: linear-gradient(to bottom, transparent, var(--accent), transparent);
      margin: 2.75rem auto;
      opacity: 0;
      animation: fade 0.8s ease forwards 0.7s;
    }

    .hero-sub {
      font-size: clamp(0.75rem, 2vw, 0.9375rem);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.06em;
      line-height: 1;
      white-space: nowrap;
      opacity: 0;
      animation: up 0.7s cubic-bezier(0.22,1,0.36,1) forwards 0.95s;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.75rem 2.5rem;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 2rem;
    }

    .footer-identity {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .footer-name {
      font-size: 1.125rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .footer-meta {
      font-family: 'Inter', sans-serif;
      font-size: 0.625rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .footer-link {
      font-size: 0.875rem;
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
      position: relative;
    }
    .footer-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0; right: 0;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }
    .footer-link:hover { color: var(--text); }
    .footer-link:hover::after { transform: scaleX(1); }

    .footer-copy {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.5625rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes up   { to { opacity: 1; transform: none; } }
    @keyframes fade { to { opacity: 1; } }

    /* Mobile */
    @media (max-width: 520px) {
      .hero-title { letter-spacing: 0.1em; white-space: normal; line-height: 1.1; }
      .hero-sub { white-space: normal; text-align: center; line-height: 1.7; }
      footer { grid-template-columns: 1fr; align-items: start; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <section id="hero">
    <h1 class="hero-title">Ungrateful Dog Lab.</h1>
    <div class="hero-accent" aria-hidden="true"></div>
    <p class="hero-sub">@Beerbear_A &nbsp;&mdash;&nbsp; LIFE FEELS LIKE MUSIC</p>
  </section>

  <footer>
    <div class="footer-identity">
      <span class="footer-name">Shinichi Arita</span>
      <span class="footer-meta">ex:Beerbear &nbsp;/&nbsp; DJ &nbsp;/&nbsp; Dev</span>
    </div>
    <nav class="footer-links">
      <a href="https://x.com/Beerbear_A" class="footer-link" target="_blank" rel="noopener noreferrer">X</a>
      <a href="https://note.com/beerbear_a" class="footer-link" target="_blank" rel="noopener noreferrer">Note</a>
    </nav>
    <p class="footer-copy">&copy; 2025 Ungrateful Dog Lab.</p>
  </footer>

</body>
</html>
