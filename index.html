  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white:  #ffffff;
      --accent: #a7e8f6;
      --dark:   #42403d;
      --muted:  rgba(66,64,61,0.38);
      --border: rgba(66,64,61,0.12);
    }
    html, body { height: 100%; }
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--white);
      color: var(--dark);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    #hero {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      overflow: hidden;
      cursor: crosshair;
    }
    #vj-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .hero-title {
      position: relative;
      z-index: 1;
      font-size: clamp(1.1rem, 3.5vw, 2.5rem);
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      white-space: nowrap;
      color: var(--dark);
      pointer-events: none;
      text-shadow: 0 0 20px #fff, 0 0 50px #fff, 0 0 90px rgba(255,255,255,0.8);
      opacity: 0;
      animation: up 1.4s cubic-bezier(0.22,1,0.36,1) forwards 0.4s;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      text-align: center;
    }
    .footer-name {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .footer-links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.875rem 2rem;
      min-width: 140px;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--dark);
      text-decoration: none;
      border: 1.5px solid var(--dark);
      transition: background 0.22s, border-color 0.22s;
    }
    .footer-link:hover, .footer-link:active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .footer-link svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }
    .footer-copy {
      font-family: 'Inter', sans-serif;
      font-size: 0.5625rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    @keyframes up { to { opacity: 1; transform: none; } }
    @media (max-width: 480px) {
      .hero-title { letter-spacing: 0.14em; white-space: normal; text-align: center; line-height: 1.3; }
      .footer-link { min-width: 130px; padding: 0.875rem 1.5rem; }
    }
  </style>

<script>
    // ── Golden ratio constants ──────────────────────────────────────
    const φ  = 1.6180339887;   // golden ratio
    const φ2 = φ * φ;          // ≈ 2.618
    const GA = Math.PI * 2 / φ2; // golden angle ≈ 137.5°

    // Fibonacci polygon sides pool
    const FIB_SIDES = [3, 5, 8, 5, 3, 8];

    // ── Canvas setup ───────────────────────────────────────────────
    const canvas = document.getElementById('vj-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, DPR;

    function resize() {
      DPR = window.devicePixelRatio || 1;
      const r = canvas.getBoundingClientRect();
      W = r.width; H = r.height;
      canvas.width  = W * DPR;
      canvas.height = H * DPR;
      ctx.scale(DPR, DPR);
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Stepped / quantised noise (Edgy & Scientific) ──────────────
    const NOISE_STEP = 0.08;
    function noise(x, t, seed = 0) {
      const qt = Math.floor(t / NOISE_STEP) * NOISE_STEP;
      
      // 1. 基本の緩やかなうねり (Sine)
      let wave = Math.sin(x * 5.1 + qt * 1.7 + seed) * 0.40;
      
      // 2. ノコギリ波 (Sawtooth) - 鋭く切り立つ斜めのエッジ
      wave += ((x * 12.3 - qt * 3.1 + seed) % 2 - 1) * 0.30;
      
      // 3. 矩形波 / パルス (Square/Pulse) - デジタルなON/OFFの垂直ノイズ
      wave += Math.sign(Math.sin(x * 25.0 + qt * 8.0 + seed)) * 0.15;

      // 4. 振幅の量子化 (Bitcrush)
      const levels = 6;
      return Math.floor(wave * levels) / levels;
    }

    // ── Drifting grid (background) ─────────────────────────────────
    function drawGrid(sec) {
      const CELL = 60;
      const ox   = (sec * 4) % CELL;
      const oy   = (sec * 3) % CELL;
      ctx.strokeStyle = 'rgba(167,232,246,0.10)';
      ctx.lineWidth   = 0.4;
      
      // エッジを鋭くバキッとさせる設定
      ctx.lineJoin = 'miter';
      ctx.miterLimit = 10;

      for (let bx = -CELL + (W % CELL) / 2 - ox; bx < W + CELL; bx += CELL) {
        ctx.beginPath();
        for (let y = 0; y <= H; y += 8) {
          const x = bx + 2.5 * noise(y / H, sec * 0.6, bx);
          y === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
      for (let by = -CELL + (H % CELL) / 2 - oy; by < H + CELL; by += CELL) {
        ctx.beginPath();
        for (let x = 0; x <= W; x += 8) {
          const y = by + 2.5 * noise(x / W, sec * 0.5, by);
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    // ── Polygon burst pool ─────────────────────────────────────────
    const rings = [];

    // Equal-weight polygon sides
    const ALL_SIDES = [4, 5, 6, 7, 8, 9, 10, 12];

    function spawnBurst(ox, oy, sec) {
      const N         = 3 + Math.floor(Math.random() * 6);
      const baseScale = 0.12 + Math.random() * 0.50;
      const stagger   = 0.12 + Math.random() * 0.25;
      const lifeBase  = 3.0 + Math.random() * 3.0;
      const dirBias   = Math.random() < 0.5 ? 1 : -1;
      const burstSides = ALL_SIDES[Math.floor(Math.random() * ALL_SIDES.length)];

      for (let i = 0; i < N; i++) {
        const shift = Math.floor(Math.random() * 3) - 1;
        const sides = Math.max(4, Math.min(12, burstSides + shift));
        rings.push({
          ox, oy,
          born:     sec + i * stagger,
          life:     lifeBase * (0.7 + Math.random() * 0.6),
          maxR:     Math.min(W, H) * (baseScale + i * (0.07 + Math.random() * 0.08)),
          sides,
          rot:      Math.random() * Math.PI * 2,
          rotSpeed: (0.02 + Math.random() * 0.08) * dirBias * (Math.random() < 0.3 ? -1 : 1),
          accent:   Math.random() < 0.65,
          seed:     Math.random() * 200,
        });
      }
    }

    // Draw one polygon ring with jagged edges
    function drawRing(ring, sec) {
      const age = sec - ring.born;
      if (age < 0)  return true; 
      const p = age / ring.life;
      if (p >= 1)   return false; 

      const r    = ring.maxR * p;
      const a    = Math.pow(Math.sin(p * Math.PI), 0.48) * 0.85;
      const rot  = ring.rot + ring.rotSpeed * sec;
      const nAmp = r * 0.04; 

      ctx.lineWidth   = 0.6;
      ctx.strokeStyle = ring.accent
        ? `rgba(167,232,246,${a})`
        : `rgba(66,64,61,${a * 0.52})`;
        
      // エッジを鋭くバキッとさせる設定
      ctx.lineJoin = 'miter';
      ctx.miterLimit = 10;

      ctx.beginPath();
      let first = true;

      for (let s = 0; s < ring.sides; s++) {
        const θ0  = (s        / ring.sides) * Math.PI * 2 + rot;
        const θ1  = ((s + 1) / ring.sides) * Math.PI * 2 + rot;
        const v0x = ring.ox + r * Math.cos(θ0);
        const v0y = ring.oy + r * Math.sin(θ0);
        const v1x = ring.ox + r * Math.cos(θ1);
        const v1y = ring.oy + r * Math.sin(θ1);

        const eLen = Math.hypot(v1x - v0x, v1y - v0y);
        const ex   = (v1x - v0x) / eLen;
        const ey   = (v1y - v0y) / eLen;
        const px   = -ey, py = ex;  

        const SEGS = Math.max(4, Math.ceil(eLen / (8 / φ)));
        for (let j = 0; j <= SEGS; j++) {
          const t  = j / SEGS;
          const d  = nAmp * noise(s * φ + t * φ2, sec * 1.5, ring.seed);
          const x  = v0x + t * (v1x - v0x) + px * d;
          const y  = v0y + t * (v1y - v0y) + py * d;
          first ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          first = false;
        }
      }
      ctx.closePath();
      ctx.stroke();
      return true;
    }

    // ── Random origin ─────────────
    function randomOrigin() {
      return { x: W * (0.1 + Math.random() * 0.8),
               y: H * (0.1 + Math.random() * 0.8) };
    }

    // ── Click / tap: spawn extra burst at that point ───────────────
    const hero = document.getElementById('hero');
    hero.addEventListener('click', e => {
      const r = canvas.getBoundingClientRect();
      spawnBurst(e.clientX - r.left, e.clientY - r.top, performance.now() / 1000);
    });
    hero.addEventListener('touchstart', e => {
      const r = canvas.getBoundingClientRect();
      spawnBurst(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top, performance.now() / 1000);
    }, { passive: true });

    // ── Auto-spawn ────────────────
    let nextAuto = 0;
    const AUTO_INTERVAL = 1.5; 

    // ── Initial burst ──────────────────────────────────────────────
    { const o = randomOrigin(); spawnBurst(o.x, o.y, 0.01); }

    // ── Main loop ──────────────────────────────────────────────────
    function draw(t) {
      const sec = t / 1000;

      if (sec >= nextAuto) {
        const o = randomOrigin(); spawnBurst(o.x, o.y, sec);
        nextAuto = sec + AUTO_INTERVAL + Math.random() * 0.8;
      }

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      drawGrid(sec);

      for (let i = rings.length - 1; i >= 0; i--) {
        if (!drawRing(rings[i], sec)) rings.splice(i, 1);
      }
    }

    function loop(t) { draw(t); requestAnimationFrame(loop); }
    requestAnimationFrame(loop);
  </script>
