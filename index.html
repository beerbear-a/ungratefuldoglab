<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ungrateful Dog Lab. — Shinichi Arita (@Beerbear_A)">
  <title>Ungrateful Dog Lab.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white:  #ffffff;
      --accent: #a7e8f6;
      --dark:   #42403d;
      --muted:  rgba(66,64,61,0.38);
      --border: rgba(66,64,61,0.12);
    }
    html, body { height: 100%; }
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--white);
      color: var(--dark);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero ── */
    #hero {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      overflow: hidden;
    }
    #vj-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .hero-title {
      position: relative;
      z-index: 1;
      font-size: clamp(1.1rem, 3.5vw, 2.5rem);
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      white-space: nowrap;
      color: var(--dark);
      text-shadow:
        0 0 20px #fff,
        0 0 40px #fff,
        0 0 80px rgba(255,255,255,0.9);
      opacity: 0;
      animation: up 1.4s cubic-bezier(0.22,1,0.36,1) forwards 0.4s;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      text-align: center;
    }
    .footer-name {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .footer-links {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.875rem 2rem;
      min-width: 140px;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--dark);
      text-decoration: none;
      border: 1.5px solid var(--dark);
      transition: background 0.22s, border-color 0.22s;
    }
    .footer-link:hover, .footer-link:active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .footer-link svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }
    .footer-copy {
      font-family: 'Inter', sans-serif;
      font-size: 0.5625rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @keyframes up { to { opacity: 1; transform: none; } }
    @media (max-width: 480px) {
      .hero-title { letter-spacing: 0.14em; white-space: normal; text-align: center; line-height: 1.3; }
      .footer-link { min-width: 130px; padding: 0.875rem 1.5rem; }
    }
  </style>
</head>
<body>

  <section id="hero">
    <canvas id="vj-canvas" aria-hidden="true"></canvas>
    <h1 class="hero-title">Ungrateful Dog Lab.</h1>
  </section>

  <footer>
    <p class="footer-name">Shinichi Arita</p>
    <nav class="footer-links">
      <a href="https://x.com/Beerbear_A" class="footer-link" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        X (Twitter)
      </a>
      <a href="https://note.com/beerbear_a" class="footer-link" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 0 0-2 2v16l4-4h12a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 12H7v-2h5v2zm5-4H7V9h10v2z"/></svg>
        Note
      </a>
    </nav>
    <p class="footer-copy">&copy; 2025 Ungrateful Dog Lab.</p>
  </footer>

  <script>
    const canvas = document.getElementById('vj-canvas');
    const ctx    = canvas.getContext('2d');

    let W, H, DPR, CX, CY, DIAG;

    // Target position (mouse/touch) and current interpolated position
    let targetX, targetY;

    function resize() {
      DPR = window.devicePixelRatio || 1;
      const r = canvas.getBoundingClientRect();
      W = r.width; H = r.height;
      // Initialize center only on first call
      if (targetX === undefined) { targetX = W / 2; targetY = H / 2; }
      CX = W / 2; CY = H / 2;
      DIAG = Math.hypot(W, H);
      canvas.width  = W * DPR;
      canvas.height = H * DPR;
      ctx.scale(DPR, DPR);
    }
    window.addEventListener('resize', resize);
    resize();

    // Center moves only on click / tap — not on hover
    const hero = document.getElementById('hero');
    function setTarget(clientX, clientY) {
      const r = canvas.getBoundingClientRect();
      targetX = clientX - r.left;
      targetY = clientY - r.top;
    }
    hero.addEventListener('click',      e => setTarget(e.clientX, e.clientY));
    hero.addEventListener('touchstart', e => {
      setTarget(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    // ─────────────────────────────────────────────────────────────────
    // Expanding ring pool
    // ─────────────────────────────────────────────────────────────────
    const SHAPES = [0, 0, 0, 3, 4, 4, 6]; // 0 = circle; weighted toward circles
    const rings  = [];
    let nextSpawn = 0;

    function spawnRing(sec) {
      rings.push({
        born:      sec,
        life:      2.8 + Math.random() * 2.2,
        maxR:      DIAG * (0.28 + Math.random() * 0.38),
        sides:     SHAPES[Math.floor(Math.random() * SHAPES.length)],
        rot:       Math.random() * Math.PI * 2,
        rotSpeed:  (Math.random() - 0.5) * 0.4,
        accent:    Math.random() < 0.65,
      });
    }

    function drawRing(ring, sec) {
      const age  = sec - ring.born;
      const p    = age / ring.life;           // 0 → 1
      if (p >= 1) return false;

      const r   = ring.maxR * p;
      // fade: quick ramp in, long fade out
      const a   = Math.pow(Math.sin(p * Math.PI), 0.5) * 0.75;
      const rot = ring.rot + ring.rotSpeed * sec;

      ctx.lineWidth   = 0.6;
      ctx.strokeStyle = ring.accent
        ? `rgba(167,232,246,${a})`
        : `rgba(66,64,61,${a * 0.5})`;

      // Sample the ring perimeter with noise on radius
      const STEPS  = ring.sides === 0 ? 120 : ring.sides * 24;
      const noiseA = r * 0.025 * (1 - p * 0.5); // subtle noise — preserves edge shape

      ctx.beginPath();
      for (let i = 0; i <= STEPS; i++) {
        const frac = i / STEPS;
        let θ;
        if (ring.sides === 0) {
          θ = frac * Math.PI * 2;
        } else {
          // Snap to polygon vertices, interpolate between
          const seg   = Math.floor(frac * ring.sides);
          const local = (frac * ring.sides) - seg;
          θ = ((seg + local) / ring.sides) * Math.PI * 2 + rot;
        }
        const nr = r + noiseA * noise(frac * 6, sec * 1.4, ring.born);
        const x  = CX + nr * Math.cos(θ);
        const y  = CY + nr * Math.sin(θ);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
      return true;
    }

    // ─────────────────────────────────────────────────────────────────
    // Stepped / quantised noise — jagged, digital stutter feel
    // Time is quantised to discrete steps so the noise value "snaps"
    // rather than flowing smoothly → produces a jittery, VJ glitch look.
    // ─────────────────────────────────────────────────────────────────
    const NOISE_STEP = 0.10; // seconds per noise frame (lower = faster stutter)
    function noise(x, t, seed = 0) {
      // Quantise time → value holds for NOISE_STEP seconds then jumps
      const qt = Math.floor(t / NOISE_STEP) * NOISE_STEP;
      return (
        Math.sin(x * 4.1  + qt * 1.7  + seed) * 0.50 +
        Math.sin(x * 9.3  - qt * 2.3  + seed) * 0.30 +
        Math.sin(x * 17.7 + qt * 3.9  + seed) * 0.20
      );
    }

    // ─────────────────────────────────────────────────────────────────
    // Grid — each line wavers with noise
    // ─────────────────────────────────────────────────────────────────
    function drawGrid(sec) {
      const CELL = 60;
      const ox   = (sec * 4) % CELL;
      const oy   = (sec * 3) % CELL;
      const AMP  = 2.5; // noise amplitude in px

      ctx.strokeStyle = 'rgba(167,232,246,0.12)';
      ctx.lineWidth   = 0.4;

      // Vertical lines — wavy in x
      for (let bx = -CELL + (W % CELL) / 2 - ox; bx < W + CELL; bx += CELL) {
        ctx.beginPath();
        for (let y = 0; y <= H; y += 6) {
          const x = bx + AMP * noise(y / H, sec * 0.6, bx);
          y === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      // Horizontal lines — wavy in y
      for (let by = -CELL + (H % CELL) / 2 - oy; by < H + CELL; by += CELL) {
        ctx.beginPath();
        for (let x = 0; x <= W; x += 6) {
          const y = by + AMP * noise(x / W, sec * 0.5, by);
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    // ─────────────────────────────────────────────────────────────────
    // Spokes — lateral wobble along each spoke
    // ─────────────────────────────────────────────────────────────────
    function drawSpokes(sec) {
      const N      = 12;
      const maxR   = Math.min(W, H) * 0.42;
      const rot    = sec * 0.07;
      const breath = 0.55 + 0.45 * Math.sin(sec * 0.35);
      const AMP    = 3; // wobble amplitude in px

      ctx.lineWidth = 0.4;
      for (let i = 0; i < N; i++) {
        const θ = (i / N) * Math.PI * 2 + rot;
        const r = maxR * breath;
        const a = 0.05 + 0.06 * Math.abs(Math.sin((i / N) * Math.PI + sec * 0.2));
        ctx.strokeStyle = `rgba(66,64,61,${a})`;

        // Perpendicular direction to the spoke
        const px = -Math.sin(θ), py = Math.cos(θ);

        ctx.beginPath();
        const SEGS = 20;
        for (let s = 0; s <= SEGS; s++) {
          const frac  = s / SEGS;
          const d     = AMP * noise(frac, sec * 1.2, i * 5.3) * frac; // no wobble at origin
          const x     = CX + Math.cos(θ) * r * frac + px * d;
          const y     = CY + Math.sin(θ) * r * frac + py * d;
          s === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    // ─────────────────────────────────────────────────────────────────
    // Lissajous — radial noise displaces each point
    // ─────────────────────────────────────────────────────────────────
    const LISSAJOUS = [
      { a: 3, b: 2 },
      { a: 5, b: 4 },
      { a: 4, b: 3 },
    ];
    let lisIdx = 0, lisSwitch = 0;

    function drawLissajous(sec) {
      if (sec - lisSwitch > 10) { lisIdx = (lisIdx + 1) % LISSAJOUS.length; lisSwitch = sec; }
      const { a, b } = LISSAJOUS[lisIdx];
      const δ     = sec * 0.12;
      const scale = Math.min(W, H) * 0.12;
      const AMP   = scale * 0.04; // subtle noise — Lissajous shape stays legible

      ctx.strokeStyle = 'rgba(167,232,246,0.28)';
      ctx.lineWidth   = 0.5;
      ctx.beginPath();
      const N = 600;
      for (let i = 0; i <= N; i++) {
        const t  = (i / N) * Math.PI * 2;
        const nx = AMP * noise(t, sec * 0.8, 1.0);
        const ny = AMP * noise(t, sec * 0.7, 7.3);
        const x  = CX + scale * Math.sin(a * t + δ) + nx;
        const y  = CY + scale * Math.sin(b * t)      + ny;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    // ─────────────────────────────────────────────────────────────────
    // Main loop
    // ─────────────────────────────────────────────────────────────────
    function draw(t) {
      const sec = t / 1000;

      // Smooth lerp toward mouse/touch target (ease = 0.06)
      CX += (targetX - CX) * 0.06;
      CY += (targetY - CY) * 0.06;

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      drawGrid(sec);
      drawSpokes(sec);
      drawLissajous(sec);

      // Spawn rings on a rhythm-like interval
      if (sec >= nextSpawn) {
        spawnRing(sec);
        // Occasionally double-spawn for density variation
        if (Math.random() < 0.3) spawnRing(sec);
        nextSpawn = sec + 0.7 + Math.random() * 0.8;
      }

      // Draw & prune dead rings
      for (let i = rings.length - 1; i >= 0; i--) {
        if (!drawRing(rings[i], sec)) rings.splice(i, 1);
      }
    }

    function loop(t) { draw(t); requestAnimationFrame(loop); }
    requestAnimationFrame(loop);
  </script>

</body>
</html>
